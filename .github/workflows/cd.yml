name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
  release:
    types:
      - published
  schedule:
    - cron: "34 5 * * *"

permissions:
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Pre-build the dashboard UI so hatch_build.py finds dist/ during packaging.
      # uv/hatchling don't know about bun, so we must do this before the Python build.
      - uses: prefix-dev/setup-pixi@v0
        with:
          pixi-version: latest
          environments: dashboard
          cache: true

      - name: Build dashboard UI
        run: pixi run -e dashboard dashboard-bundle

      - uses: hynek/build-and-inspect-python-package@v2

  publish:
    needs: [dist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    environment:
      name: pypi
      url: https://pypi.org/p/histserv
    permissions:
      id-token: write
      attestations: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: Packages
          path: dist

      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"

      - uses: pypa/gh-action-pypi-publish@release/v1
