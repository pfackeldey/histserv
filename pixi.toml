[workspace]
channels = ["conda-forge"]
name = "histserv"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"
authors = ["Giordon Stark"]

[tasks]
dashboard-install = { cmd = "bun install", cwd = "dashboard/ui" }
dashboard-dev = { cmd = "bun run dev", cwd = "dashboard/ui" }
dashboard-build = { cmd = "bun run build", cwd = "dashboard/ui" }
dashboard-test = { cmd = "bun run test", cwd = "dashboard/ui" }
dashboard-lint = { cmd = "bun run lint", cwd = "dashboard/ui" }
dashboard-format = { cmd = "bun run format", cwd = "dashboard/ui" }
dashboard-format-check = { cmd = "bun run format:check", cwd = "dashboard/ui" }
dashboard-check = { cmd = "bun run check", cwd = "dashboard/ui" }
lint = "pre-commit run --all-files"

[dependencies]
bun = ">=1.3.11,<2"
nodejs = ">=20"
pre-commit = ">=4"
