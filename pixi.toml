[workspace]
channels = ["conda-forge"]
name = "histserv"
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64"]
version = "0.1.0"
authors = ["Giordon Stark"]
preview = ["pixi-build"]

[dependencies]
histserv = { path = "./" }

[package]
name = "histserv"
version = "latest"

[package.build]
backend = { name = "pixi-build-python", version = "*" }
config = { noarch = true }

[package.host-dependencies]
uv = "*"
hatchling = ">=1.25"
hatch-vcs = ">=0.4"

[package.run-dependencies]
grpcio = ">=1.76.0"
hist = ">=2.9.0"
boost-histogram = ">=1.7.1"
uhi = ">=1.0.0"
numcodecs = ">=0.13.1"
grpcio-tools = ">=1.78.0"

[feature.dev.dependencies]
pre-commit = ">=4"

[feature.dev.tasks]
lint = "pre-commit run --all-files"

[feature.dashboard.dependencies]
concurrently = "*"
bun = ">=1.3.11,<2"
nodejs = ">=20"
fastapi = ">=0.115.0"
uvicorn = ">=0.32.0"
httpx = ">=0.27.0"

[tasks]
serve = { cmd = "histserv --port 50051" }

[feature.dashboard.tasks]
dashboard-install = { cmd = "bun install", cwd = "src/histserv/dashboard/ui" }
dashboard-dev = { cmd = "bun run dev", cwd = "src/histserv/dashboard/ui" }
dashboard-build = { cmd = "bun run build", cwd = "src/histserv/dashboard/ui" }
dashboard-test = { cmd = "bun run test", cwd = "src/histserv/dashboard/ui" }
dashboard-lint = { cmd = "bun run lint", cwd = "src/histserv/dashboard/ui" }
dashboard-format = { cmd = "bun run format", cwd = "src/histserv/dashboard/ui" }
dashboard-format-check = { cmd = "bun run format:check", cwd = "src/histserv/dashboard/ui" }
dashboard-check = { cmd = "bun run check", cwd = "src/histserv/dashboard/ui" }
dashboard-bundle = { depends-on = ["dashboard-install", "dashboard-build"] }
dashboard-serve = { cmd = "concurrently 'histserv --port 50051 --dashboard-port 8050' 'bun run dev'", cwd = "src/histserv/dashboard/ui" }

[environments]
dev = ["dev", "dashboard"]
dashboard = ["dashboard"]
